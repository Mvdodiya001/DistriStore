name: DistriStore CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  backend-tests:
    name: Backend Tests (Python 3.11)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run Unit Tests (Phases 1-5)
        run: |
          python -m tests.test_phase1
          python -m tests.test_phase2
          python -m tests.test_phase3
          python -m tests.test_phase4
          python -m tests.test_phase5

      - name: Run Crypto & Integrity Tests
        run: |
          python -m tests.test_phase2_gcm
          python -m tests.test_phase2_merkle
          python -m tests.test_phase2_swarm
          python -m tests.test_phase2_health

      - name: Run Performance & Network Tests
        run: |
          python -m tests.test_phase3_perf
          python -m tests.test_phase10_dynamic_ports
          python -m tests.test_phase12_cross_node
          python -m tests.test_phase13_throughput

      - name: Run Master E2E Test (Phases 1-21)
        run: python -m tests.test_e2e_master

  frontend-build:
    name: Frontend Build (Node 22)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Node dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Build frontend
        working-directory: ./frontend
        run: npm run build
